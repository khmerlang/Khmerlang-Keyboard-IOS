name: KhmerEnglishKeyboard
options:
  bundleIdPrefix: com.example.khmerenglish
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "15.0"

targets:
  HostApp:
    type: application
    platform: iOS
    sources:
      - HostApp
    settings:
      base:
        SWIFT_VERSION: "5.10"
        PRODUCT_BUNDLE_IDENTIFIER: "com.example.khmerenglish.host"
    dependencies:
      - target: KeyboardExtension
        embed: true

  KeyboardExtension:
    type: app-extension
    platform: iOS
    sources:
      - KhmerEnglishKeyboardExtension
    settings:
      base:
        SWIFT_VERSION: "5.10"
        PRODUCT_BUNDLE_IDENTIFIER: "com.example.khmerenglish.keyboardextension"
    info:
      path: KhmerEnglishKeyboardExtension/Info.plist

